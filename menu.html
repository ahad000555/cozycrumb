<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>The Cozy Crumb - Kitchen Update in Progress</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Pacifico&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #FEA116;
            --dark: #0F172B;
            --light: #F1F8FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Ambient background decoration matching original site theme */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(254, 161, 22, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -50px;
            left: -50px;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(254, 161, 22, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: 1;
        }

        .maintenance-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 45px 30px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
        }

        .brand-title {
            font-family: 'Pacifico', cursive;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 1px;
        }

        .brand-title i {
            font-size: 1.8rem;
        }

        .illustration-box {
            position: relative;
            margin: 0 auto 30px;
            width: 100px;
            height: 100px;
            background: rgba(254, 161, 22, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .illustration-box i {
            font-size: 3rem;
            color: var(--primary);
            animation: spin-slow 8s linear infinite;
        }

        .illustration-box .utensils-icon {
            position: absolute;
            font-size: 1.2rem;
            bottom: 12px;
            right: 12px;
            background: var(--primary);
            color: var(--dark);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }

        h2 {
            font-family: 'Heebo', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        p {
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        p.highlight {
            color: #ffffff;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 35px;
            border-left: 3px solid var(--primary);
        }

        .contact-box {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            margin-top: 25px;
        }

        .contact-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-link:hover {
            background: var(--primary);
            color: var(--dark);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(254, 161, 22, 0.3);
        }

        /* Compact Chat Button for context layout */
        .wa-chat-widget {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            background: rgba(37, 211, 102, 0.1);
            border: 1px solid rgba(37, 211, 102, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .wa-chat-widget:hover {
            background: rgba(37, 211, 102, 0.2);
            transform: translateY(-2px);
        }

        .wa-message-bubble {
            color: #ffffff;
            margin-right: 8px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .wa-avatar-container {
            position: relative;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .wa-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #25D366;
        }

        .wa-icon-badge {
            position: absolute;
            bottom: -1px;
            right: -1px;
            background-color: #25D366;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            border: 1px solid var(--dark);
        }

        .wa-icon-badge::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            border: 1px solid #25D366;
            animation: pulse-ring 1.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.7); opacity: 1; }
            80%, 100% { transform: scale(2.2); opacity: 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 576px) {
            body {
                padding: 15px;
            }
            
            .maintenance-container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .brand-title {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }

            .illustration-box {
                width: 85px;
                height: 85px;
                margin-bottom: 25px;
            }

            .illustration-box i {
                font-size: 2.5rem;
            }

            .illustration-box .utensils-icon {
                width: 24px;
                height: 24px;
                font-size: 1rem;
                bottom: 8px;
                right: 8px;
            }

            h2 {
                font-size: 1.5rem;
                margin-bottom: 12px;
            }

            p {
                font-size: 0.95rem;
                line-height: 1.5;
                margin-bottom: 20px;
            }

            p.highlight {
                font-size: 0.95rem;
                padding: 8px 12px;
                margin-bottom: 30px;
            }

            .contact-box {
                padding-top: 20px;
                margin-top: 20px;
            }

            .social-links {
                gap: 12px;
                margin-bottom: 20px;
            }

            .social-link {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            .wa-chat-widget {
                padding: 6px 12px;
                width: 100%;
                justify-content: center;
            }

            .wa-message-bubble {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        
        <div class="illustration-box">
            <i class="fa fa-cog"></i>
            <div class="utensils-icon">
                <i class="fa fa-cookie-bite" style="font-size: 0.75rem; color: #0F172B;"></i>
            </div>
        </div>

        <h2>Maintenance Underway</h2>
        <p>We're performing some quick website maintenance to make your online ordering experience even better. Because of this, our site is temporarily offline.</p>
        
        <p class="highlight">
            🍩 We'll be back cooking very soon!
        </p>

        <div class="contact-box">
            <div class="contact-title">Stay in touch</div>
            
            <div class="social-links">
                <a href="https://www.facebook.com/thecozycrumb1/" target="_blank" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/the_cozy_crumb_official__?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
            </div>

            <a href="https://wa.me/447459889751?text=Hello!%20I%20have%20a%20question%20about%20ordering%20from%20The%20Cozy%20Crumb." target="_blank" class="wa-chat-widget">
                <div class="wa-message-bubble">
                    Need to ask us something? Chat now
                </div>
                <div class="wa-avatar-container">
                    <img class="wa-avatar-img" src="img/anjela.jpg" alt="Anjela">
                    <div class="wa-icon-badge"></div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
